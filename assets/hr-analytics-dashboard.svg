      <text x="460" y="170">16.12%</text>
      <text x="673" y="170">1,233</text>
      <text x="910" y="170">37</text>
    </g>
    <text x="1058" y="112" fill="#ffd95c" font-size="17" font-weight="700">Attrition by Gender</text>
    <text x="1078" y="152" fill="#fff" font-size="14">Female</text>
