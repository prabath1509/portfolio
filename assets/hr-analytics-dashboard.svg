    <rect x="1048" y="78" width="150" height="118" fill="#31568d" opacity="0.92"/>
    <g fill="#ffd95c" font-size="22" font-weight="700">
      <text x="36" y="112">Employee Count</text>
      <text x="255" y="112">Attrition Count</text>
      <text x="462" y="112">Attrition Rate</text>
      <text x="640" y="112">Active Employees</text>
      <text x="890" y="112">Avg. Age</text>
    </g>
    <g fill="#ffffff" font-size="42" font-weight="700">
