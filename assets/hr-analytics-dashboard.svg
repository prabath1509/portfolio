<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">HR Analytics Dashboard preview</title>
  <desc id="desc">A stylized HR analytics dashboard with KPI cards, charts, and matrix visuals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071019"/>
      <stop offset="0.48" stop-color="#19324e"/>
      <stop offset="1" stop-color="#3b6095"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#152739"/>
      <stop offset="1" stop-color="#365c94"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e4a7d1"/>
      <stop offset="1" stop-color="#8c5c98"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="64" fill="#102338" opacity="0.95"/>
  <text x="24" y="48" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700">HR ANALYTICS DASHBOARD</text>
  <text x="858" y="24" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Education</text>
