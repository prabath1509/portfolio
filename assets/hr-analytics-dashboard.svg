      <circle cx="650" cy="604" r="34" fill="none" stroke="#9a65c9" stroke-width="18"/>
      <circle cx="650" cy="604" r="34" fill="none" stroke="#ffb966" stroke-width="18" stroke-dasharray="48 150"/>
