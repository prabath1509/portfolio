      <rect x="930" y="296" width="224" height="22" fill="#acd5ed"/>
      <rect x="930" y="322" width="224" height="22" fill="#8fc1df"/>
      <rect x="930" y="348" width="224" height="22" fill="#6da1cc"/>
      <rect x="930" y="374" width="224" height="22" fill="#5590bf"/>
      <rect x="930" y="400" width="224" height="22" fill="#acd5ed"/>
      <rect x="930" y="426" width="224" height="22" fill="#6da1cc"/>
